name: Build

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            test_bin: ./bin/run_tests
            bench_bin: ./bin/benchmark
            tsan: 1
          - os: ubuntu-latest
            test_bin: ./bin/run_tests
            bench_bin: ./bin/benchmark
            tsan: 0
          - os: ubuntu-latest
            test_bin: ./bin/run_tests
            bench_bin: ./bin/benchmark
            tsan: 0
            asan: 1
          - os: macos-latest
            test_bin: ./bin/run_tests
            bench_bin: ./bin/benchmark
            tsan: 0
          - os: windows-latest
            test_bin: .\bin\run_tests.exe
            bench_bin: .\bin\benchmark.exe
            tsan: 0

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install SCons
        run: pip install scons

      - name: Build
        shell: bash
        timeout-minutes: 15
        run: scons -j$(nproc || echo 4) TSAN=${{ matrix.tsan }} ASAN=${{ matrix.asan || 0 }}

      - name: Build tests
        shell: bash
        timeout-minutes: 15
        run: scons test -j$(nproc || echo 4) TSAN=${{ matrix.tsan }} ASAN=${{ matrix.asan || 0 }}

      - name: Run tests
        if: matrix.tsan != 1
        timeout-minutes: 5
        run: ${{ matrix.test_bin }}

      - name: Run tests (TSan)
        if: matrix.tsan == 1
        timeout-minutes: 10
        env:
          TSAN_OPTIONS: suppressions=tsan_suppressions.txt halt_on_error=1
        run: ${{ matrix.test_bin }}

      - name: Run tests (ASan+UBSan)
        if: matrix.asan == 1
        timeout-minutes: 10
        env:
          ASAN_OPTIONS: detect_leaks=1 abort_on_error=1 print_stacktrace=1
          UBSAN_OPTIONS: print_stacktrace=1 halt_on_error=1
        run: ${{ matrix.test_bin }}

      - name: Build benchmark
        if: matrix.tsan != 1 && matrix.asan != 1
        shell: bash
        timeout-minutes: 10
        run: scons bench -j$(nproc || echo 4)

      - name: Run benchmark
        if: matrix.tsan != 1 && matrix.asan != 1
        timeout-minutes: 2
        run: ${{ matrix.bench_bin }} --check benchmark_baseline.txt

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install SCons
        run: pip install scons

      - name: Install clang
        run: sudo apt-get install -y clang

      - name: Build fuzz targets
        timeout-minutes: 10
        run: CC=clang CXX=clang++ scons fuzz -j$(nproc)

      - name: Run fuzz_chunk_load
        timeout-minutes: 2
        run: timeout 60s ./bin/fuzz_chunk_load -seed=12345 || [ $? -eq 124 ]

      - name: Run fuzz_palette
        timeout-minutes: 2
        run: timeout 60s ./bin/fuzz_palette -seed=12345 || [ $? -eq 124 ]

      - name: Run fuzz_light_propagation
        timeout-minutes: 2
        run: timeout 60s ./bin/fuzz_light_propagation -seed=12345 || [ $? -eq 124 ]

      - name: Run fuzz_mesh_builder
        timeout-minutes: 2
        run: timeout 60s ./bin/fuzz_mesh_builder -seed=12345 || [ $? -eq 124 ]

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install SCons
        run: pip install scons

      - name: Install clang-tidy
        run: sudo apt-get install -y clang-tidy

      - name: Run scons to generate godot-cpp headers and compile_commands.json
        timeout-minutes: 10
        run: scons -j$(nproc)

      - name: Run clang-tidy
        run: |
          # Deduplicate compile_commands.json — SCons may emit multiple entries per file (per build target),
          # which causes clang-tidy to process each file multiple times.
          jq 'unique_by(.file)' compile_commands.json > compile_commands_dedup.json
          mv compile_commands_dedup.json compile_commands.json
          files=$(find src/ -name '*.cpp' -type f | sort -u)
          echo "Checking $(echo "$files" | wc -l) source files"
          echo "$files"
          # Run clang-tidy and capture output. Don't fail on godot-cpp header noise.
          clang-tidy $files -p . --header-filter='src/' -quiet \
            -checks=bugprone-*,concurrency-*,performance-*,-bugprone-easily-swappable-parameters \
            > clang-tidy-output.txt 2>&1 || true
          # Only gate on actual findings in our source code (lines with check annotations).
          # godot-cpp parse errors produce "warnings N and M errors generated" lines without check names.
          if grep -E 'warning:.*\[' clang-tidy-output.txt | grep -v 'godot-cpp'; then
            echo "::error::clang-tidy found issues in source files"
            exit 1
          fi
          echo "No findings in project source files"

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install SCons
        run: pip install scons

      - name: Install lcov
        run: sudo apt-get install -y lcov

      - name: Build tests with coverage
        shell: bash
        timeout-minutes: 15
        run: scons test -j$(nproc) COVERAGE=1

      - name: Run tests
        timeout-minutes: 5
        run: ./bin/run_tests

      - name: Generate coverage report
        run: |
          lcov --capture --directory . --output-file coverage.info
          lcov --remove coverage.info '/usr/*' 'godot-cpp/*' --output-file coverage.info
          lcov --list coverage.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.info
          fail_ci_if_error: false
