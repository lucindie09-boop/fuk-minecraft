name: Build

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            test_bin: ./bin/run_tests
            bench_bin: ./bin/benchmark
            tsan: 1
          - os: ubuntu-latest
            test_bin: ./bin/run_tests
            bench_bin: ./bin/benchmark
            tsan: 0
          - os: ubuntu-latest
            test_bin: ./bin/run_tests
            bench_bin: ./bin/benchmark
            tsan: 0
            asan: 1
          - os: macos-latest
            test_bin: ./bin/run_tests
            bench_bin: ./bin/benchmark
            tsan: 0
          - os: windows-latest
            test_bin: .\bin\run_tests.exe
            bench_bin: .\bin\benchmark.exe
            tsan: 0

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install SCons
        run: pip install scons

      - name: Build
        shell: bash
        timeout-minutes: 15
        run: scons -j$(nproc || echo 4) TSAN=${{ matrix.tsan }} ASAN=${{ matrix.asan || 0 }}

      - name: Build tests
        shell: bash
        timeout-minutes: 15
        run: scons test -j$(nproc || echo 4) TSAN=${{ matrix.tsan }} ASAN=${{ matrix.asan || 0 }}

      - name: Run tests
        if: matrix.tsan != 1
        timeout-minutes: 5
        run: ${{ matrix.test_bin }}

      - name: Run tests (TSan)
        if: matrix.tsan == 1
        timeout-minutes: 10
        env:
          TSAN_OPTIONS: suppressions=tsan_suppressions.txt halt_on_error=1
        run: ${{ matrix.test_bin }}

      - name: Run tests (ASan+UBSan)
        if: matrix.asan == 1
        timeout-minutes: 10
        env:
          ASAN_OPTIONS: detect_leaks=1 abort_on_error=1 print_stacktrace=1
          UBSAN_OPTIONS: print_stacktrace=1 halt_on_error=1
        run: ${{ matrix.test_bin }}

      - name: Build benchmark
        if: matrix.tsan != 1 && matrix.asan != 1
        shell: bash
        timeout-minutes: 10
        run: scons bench -j$(nproc || echo 4)

      - name: Run benchmark
        if: matrix.tsan != 1 && matrix.asan != 1
        timeout-minutes: 2
        run: ${{ matrix.bench_bin }} --check benchmark_baseline.txt
