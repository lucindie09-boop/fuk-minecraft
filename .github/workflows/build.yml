name: Build

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            test_bin: ./bin/run_tests
            bench_bin: ./bin/benchmark
            tsan: 1
          - os: ubuntu-latest
            test_bin: ./bin/run_tests
            bench_bin: ./bin/benchmark
            tsan: 0
          - os: ubuntu-latest
            test_bin: ./bin/run_tests
            bench_bin: ./bin/benchmark
            tsan: 0
            asan: 1
          - os: macos-latest
            test_bin: ./bin/run_tests
            bench_bin: ./bin/benchmark
            tsan: 0
          - os: windows-latest
            test_bin: .\bin\run_tests.exe
            bench_bin: .\bin\benchmark.exe
            tsan: 0

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install SCons
        run: pip install scons

      - name: Build
        shell: bash
        timeout-minutes: 15
        run: scons -j$(nproc || echo 4) TSAN=${{ matrix.tsan }} ASAN=${{ matrix.asan || 0 }}

      - name: Build tests
        shell: bash
        timeout-minutes: 15
        run: scons test -j$(nproc || echo 4) TSAN=${{ matrix.tsan }} ASAN=${{ matrix.asan || 0 }}

      - name: Run tests
        if: matrix.tsan != 1
        timeout-minutes: 5
        run: ${{ matrix.test_bin }}

      - name: Run tests (TSan)
        if: matrix.tsan == 1
        timeout-minutes: 10
        env:
          TSAN_OPTIONS: suppressions=tsan_suppressions.txt halt_on_error=1
        run: ${{ matrix.test_bin }}

      - name: Run tests (ASan+UBSan)
        if: matrix.asan == 1
        timeout-minutes: 10
        env:
          ASAN_OPTIONS: detect_leaks=1 abort_on_error=1 print_stacktrace=1
          UBSAN_OPTIONS: print_stacktrace=1 halt_on_error=1
        run: ${{ matrix.test_bin }}

      - name: Build benchmark
        if: matrix.tsan != 1 && matrix.asan != 1
        shell: bash
        timeout-minutes: 10
        run: scons bench -j$(nproc || echo 4)

      - name: Run benchmark
        if: matrix.tsan != 1 && matrix.asan != 1
        timeout-minutes: 2
        run: ${{ matrix.bench_bin }} --check benchmark_baseline.txt

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install SCons
        run: pip install scons

      - name: Install clang
        run: sudo apt-get install -y clang

      - name: Build fuzz targets
        timeout-minutes: 10
        run: CC=clang CXX=clang++ scons fuzz -j$(nproc)

      - name: Run fuzz_chunk_load
        timeout-minutes: 2
        run: timeout 60s ./bin/fuzz_chunk_load -seed=12345 || [ $? -eq 124 ]

      - name: Run fuzz_palette
        timeout-minutes: 2
        run: timeout 60s ./bin/fuzz_palette -seed=12345 || [ $? -eq 124 ]

      - name: Run fuzz_light_propagation
        timeout-minutes: 2
        run: timeout 60s ./bin/fuzz_light_propagation -seed=12345 || [ $? -eq 124 ]

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install SCons
        run: pip install scons

      - name: Install clang-tidy
        run: sudo apt-get install -y clang-tidy

      - name: Run scons to generate godot-cpp headers and compile_commands.json
        timeout-minutes: 10
        run: scons -j$(nproc)

      - name: Run clang-tidy
        continue-on-error: true
        run: |
          # Normalize paths to catch format differences (src/x.cpp vs ./src/x.cpp vs absolute)
          files=$(jq -r '.[].file' compile_commands.json | xargs -n1 realpath --relative-to=. 2>/dev/null | grep -E '^src/.*\.cpp$' | sort -u)
          echo "Checking $(echo "$files" | wc -l) source files"
          echo "$files"
          set -o pipefail
          clang-tidy $files -p . --header-filter=src/ \
            -checks=bugprone-*,concurrency-*,cppcoreguidelines-*,performance-*,-bugprone-easily-swappable-parameters,-cppcoreguidelines-avoid-magic-numbers \
            2>&1 | tee clang-tidy-output.txt
          echo "clang-tidy exit code: ${PIPESTATUS[0]}"

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install SCons
        run: pip install scons

      - name: Install lcov
        run: sudo apt-get install -y lcov

      - name: Build tests with coverage
        shell: bash
        timeout-minutes: 15
        run: scons test -j$(nproc) COVERAGE=1

      - name: Run tests
        timeout-minutes: 5
        run: ./bin/run_tests

      - name: Generate coverage report
        run: |
          lcov --capture --directory . --output-file coverage.info
          lcov --remove coverage.info '/usr/*' 'godot-cpp/*' --output-file coverage.info
          lcov --list coverage.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.info
          fail_ci_if_error: false
