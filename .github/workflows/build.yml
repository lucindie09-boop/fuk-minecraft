name: Build

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            test_bin: ./bin/run_tests
            tsan: 1
          - os: macos-latest
            test_bin: ./bin/run_tests
            tsan: 0
          - os: windows-latest
            test_bin: .\bin\run_tests.exe
            tsan: 0

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install SCons
        run: pip install scons

      - name: Build
        shell: bash
        timeout-minutes: 15
        run: scons -j$(nproc || echo 4) TSAN=${{ matrix.tsan }}

      - name: Build tests
        shell: bash
        timeout-minutes: 15
        run: scons test -j$(nproc || echo 4) TSAN=${{ matrix.tsan }}

      - name: Run tests
        if: matrix.tsan != 1
        timeout-minutes: 5
        run: ${{ matrix.test_bin }}

      - name: Run tests (TSan)
        if: matrix.tsan == 1
        timeout-minutes: 10
        env:
          TSAN_OPTIONS: suppressions=tsan_suppressions.txt halt_on_error=1
        run: ${{ matrix.test_bin }}
